<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <!-- Link to external CSS stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Management System</h1>
        
        <!-- Form to add or update student data -->
        <form id="student-form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" required placeholder="Enter student name">
            </div>
            <div class="form-group">
                <label for="roll">Roll Number:</label>
                <input type="text" id="roll" required placeholder="Enter roll number">
            </div>
            <div class="form-group">
                <label for="course">Course:</label>
                <input type="text" id="course" required placeholder="Enter course name">
            </div>
            <button type="submit" id="submit-btn" class="btn">Add Student</button>
        </form>

        <!-- Table displaying the list of students -->
        <h2>Student List</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Roll Number</th>
                        <th>Name</th>
                        <th>Course</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="student-list">
                    <!-- JavaSript will dynamically insert table rows here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
