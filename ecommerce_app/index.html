<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce App (React + Node + SQLite)</title>
    
    <!-- React loaded via CDN for simplicity and to avoid node_modules in frontend structure -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel standalone to compile JSX directly in browser -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <!-- Script configured to be compiled by Babel -->
    <script type="text/babel" src="script.js"></script>
</body>
</html>
