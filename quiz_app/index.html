<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Online Quiz</h1>
        
        <!-- Quiz Container -->
        <div id="quiz-container">
            <h2 id="question-text">Question formatting goes here</h2>
            <ul id="option-list" class="options">
                <!-- Options will be injected by JavaScript -->
            </ul>
            <button id="submit-btn" class="btn">Submit Answer</button>
        </div>

        <!-- Result Container (Hidden by default) -->
        <div id="result-container" class="hidden">
            <h2>Quiz Completed!</h2>
            <p>Your Score: <span id="score-display"></span> / <span id="total-display"></span></p>
            <button id="restart-btn" class="btn" onclick="location.reload()">Restart Quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
